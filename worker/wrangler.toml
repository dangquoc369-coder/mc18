name = "dq-tracker-push"
main = "src/index.js"
compatibility_date = "2024-11-01"

# Can bat co nay vi thu vien gui push (@block65/webcrypto-web-push) co dung
# module "node:crypto" - neu khong bat, Worker co the loi luc chay that.
compatibility_flags = ["nodejs_compat"]

# KV namespace luu canh bao gia + push subscription (id lay tu buoc
# `wrangler kv namespace create TRACKER_KV`).
# QUAN TRONG: dong nay phai nam TRUOC dong [triggers] ben duoi - trong TOML,
# neu dat sau [triggers] no se bi hieu nham la thuoc ve muc [triggers].
kv_namespaces = [
  { binding = "TRACKER_KV", id = "715bce1c8d2043b58bb479a73772c39b" }
]

# Cron Trigger: chay moi phut de kiem tra gia va ban push.
[triggers]
crons = ["*/1 * * * *"]

[vars]
VAPID_SUBJECT = "mailto:quocngyendanght@gmail.com"
VAPID_PUBLIC_KEY = "BMPYU0iWPVAFCrpSJ9_vrwSH-ddQlSaUkezVpFmKFknLQu2vWn6BhNOexwlbc-liejgcSCBcLHrDb6Nc9qBUbPM"